apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: run-n8n-workflow
on:
  workflow_dispatch:
    inputs:
      workflow_name:
        type: string
        default: hello-workflow
      input_name:
        type: string
        default: CloudBees
jobs:
  run-workflow:
    steps:
      - name: Checkout code
        uses: cloudbees-io/checkout@v2
      - name: Execute n8n workflow
        id: execute-workflow
        uses: docker://docker.n8n.io/n8nio/n8n:latest
        run: |
          /usr/local/bin/node ${{ cloudbees.workspace }}/run-workflow.js
        env:
          WORKFLOW_NAME: ${{ inputs.workflow_name }}
          NAME: ${{ inputs.input_name }}
          N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
          WORKFLOWS_DIR: ${{ cloudbees.workspace }}/n8n-workflows
      - name: Display results summary
        uses: docker://public.ecr.aws/l7o7z1g8/actions/cb-utils:main-0.1.59
        run: |
          echo "=== Execution Summary ==="
          echo '${{ steps.execute-workflow.outputs.summary-json }}' | jq '.'
      - name: Display result data
        uses: docker://public.ecr.aws/l7o7z1g8/actions/cb-utils:main-0.1.59
        run: |
          echo "=== Result Data ==="
          echo '${{ steps.execute-workflow.outputs.result-json }}' | jq '.data'
      - name: Check execution success
        uses: docker://public.ecr.aws/l7o7z1g8/actions/cb-utils:main-0.1.59
        run: |
          SUCCESS=$(echo '${{ steps.execute-workflow.outputs.summary-json }}' | jq -r '.success')
          if [ "$SUCCESS" != "true" ]; then
            echo "Workflow execution failed"
            echo '${{ steps.execute-workflow.outputs.execution-json }}' | jq '.data.resultData.error'
            exit 1
          fi
          echo "✓ Workflow executed successfully"
