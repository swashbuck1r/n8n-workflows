apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: n8n-example-multiple-parameters

on:
  workflow_dispatch:
    inputs:
      environment:
        type: string
        default: staging
      customer_id:
        type: string
        default: "12345"
      send_email:
        type: string
        default: "true"

jobs:
  process-data:
    steps:
      - name: Checkout code
        uses: cloudbees-io/checkout@v1

      - name: Run n8n workflow with multiple parameters
        id: process
        uses: ./
        with:
          workflow-name: hello-workflow
          parameters: |
            {
              "ENVIRONMENT": "${{ inputs.environment }}",
              "CUSTOMER_ID": "${{ inputs.customer_id }}",
              "SEND_EMAIL": "${{ inputs.send_email }}",
              "NAME": "CloudBees User",
              "BUILD_ID": "${{ cloudbees.run_id }}"
            }

      - name: Show results
        uses: docker://ghcr.io/helmfile/helmfile:v1.1.2
        run: |
          echo "=== Workflow Results ==="
          echo '${{ steps.process.outputs.result-json }}' | jq '.data'

          echo ""
          echo "=== Summary ==="
          echo '${{ steps.process.outputs.summary-json }}' | jq '.'

      - name: Verify success
        uses: docker://ghcr.io/helmfile/helmfile:v1.1.2
        run: |
          SUCCESS=$(echo '${{ steps.process.outputs.summary-json }}' | jq -r '.success')
          if [ "$SUCCESS" != "true" ]; then
            echo "❌ Workflow execution failed"
            exit 1
          fi
          echo "✅ Workflow executed successfully"
